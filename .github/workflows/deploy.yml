name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Commit SHA that already passed required CI checks
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout candidate SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 0

      - name: Verify required CI checks for candidate SHA
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const { execFileSync } = require('node:child_process');

          const repository = process.env.GITHUB_REPOSITORY;
          const candidateSha = process.env.CANDIDATE_SHA;
          const requiredChecks = ['web', 'browser'];

          if (!repository) {
            console.error('GITHUB_REPOSITORY is not set.');
            process.exit(1);
          }

          if (!candidateSha || !/^[0-9a-f]{7,40}$/i.test(candidateSha)) {
            console.error(
              `candidate_sha must be a 7-40 character git SHA. Got: ${candidateSha ?? '<empty>'}`
            );
            process.exit(1);
          }

          const [owner, repo] = repository.split('/');

          function ghApi(path) {
            const stdout = execFileSync(
              'gh',
              ['api', '-H', 'Accept: application/vnd.github+json', path],
              { encoding: 'utf8' }
            );

            return JSON.parse(stdout);
          }

          let checkRuns;

          try {
            const response = ghApi(
              `/repos/${owner}/${repo}/commits/${candidateSha}/check-runs?per_page=100`
            );
            checkRuns = response.check_runs ?? [];
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error);
            console.error(
              `Unable to confirm required checks for ${candidateSha}: ${message}`
            );
            process.exit(1);
          }

          const failures = [];

          for (const checkName of requiredChecks) {
            const matchingRuns = checkRuns.filter(
              (run) => run.name === checkName && run.app?.slug === 'github-actions'
            );

            if (matchingRuns.length === 0) {
              failures.push(
                `${checkName}: missing github-actions check-run`
              );
              continue;
            }

            const hasSuccessfulRun = matchingRuns.some(
              (run) => run.status === 'completed' && run.conclusion === 'success'
            );

            if (!hasSuccessfulRun) {
              const observedStates = matchingRuns
                .map((run) => `${run.status}/${run.conclusion ?? 'null'}`)
                .join(', ');
              failures.push(`${checkName}: ${observedStates}`);
            }
          }

          if (failures.length > 0) {
            console.error(
              `Required checks for ${candidateSha} are not all successful:\n${failures.join('\n')}`
            );
            process.exit(1);
          }

          console.log(
            `Verified required checks for ${candidateSha}: ${requiredChecks.join(', ')}`
          );
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
